<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Close Approach — NASA NEO Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #020916;
  --bg2: #060d1f;
  --purple: #6c3baa;
  --blue: #1e6fff;
  --teal: #00e5ff;
  --magenta: #e040fb;
  --amber: #ffab00;
  --red: #ff1744;
  --green: #00e676;
  --glass: rgba(6,13,31,0.75);
  --border: rgba(0,229,255,0.18);
  --text: #cde0ff;
  --muted: #5a7a9a;
  --font-main: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Star field ─────────────────────────────────────── */
#starfield {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ── Zodiac SVG layer ───────────────────────────────── */
#zodiac-layer {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  opacity: 0.13;
  animation: zodiac-drift 120s linear infinite;
}
@keyframes zodiac-drift {
  from { transform: rotate(0deg) scale(1.1); }
  to   { transform: rotate(360deg) scale(1.1); }
}

/* ── App shell ──────────────────────────────────────── */
#app {
  position: relative; z-index: 2;
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
}

/* ── Header ─────────────────────────────────────────── */
header {
  text-align: center;
  padding: 2.5rem 0 1.5rem;
}
header h1 {
  font-family: var(--font-main);
  font-size: clamp(1.4rem, 4vw, 2.6rem);
  font-weight: 900;
  letter-spacing: 0.12em;
  background: linear-gradient(90deg, var(--teal), var(--magenta), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  margin-bottom: 0.4rem;
}
header p {
  color: var(--muted);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── Tab bar ────────────────────────────────────────── */
#tab-bar {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
#tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  font-family: var(--font-main);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 0.75rem 1.1rem 0.65rem;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s, text-shadow 0.2s;
  position: relative;
  top: 1px;
}
.tab-btn:hover { color: var(--teal); }
.tab-btn.active {
  color: var(--teal);
  border-bottom-color: var(--teal);
  text-shadow: 0 0 12px var(--teal);
}
.tab-btn .pha-icon { color: var(--red); margin-left: 0.3rem; font-size: 0.75rem; }

/* ── Loading overlay ────────────────────────────────── */
#loading-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1.5rem;
  transition: opacity 0.5s;
}
#loading-overlay.fade-out { opacity: 0; pointer-events: none; }

.orbital-spinner {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--teal);
  border-right-color: var(--magenta);
  animation: spin 1s linear infinite;
  box-shadow: 0 0 20px var(--teal), inset 0 0 20px rgba(0,229,255,0.1);
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-family: var(--font-main);
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  color: var(--teal);
  text-shadow: 0 0 10px var(--teal);
  text-transform: uppercase;
}

/* ── Tab panels ─────────────────────────────────────── */
.tab-panel { display: none; animation: tab-fade 0.3s ease; }
.tab-panel.active { display: block; }
@keyframes tab-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ── Skeleton ───────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg2) 25%, rgba(0,229,255,0.05) 50%, var(--bg2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── Glass card ─────────────────────────────────────── */
.glass {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* ── Metric cards ───────────────────────────────────── */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1.25rem;
}
@media (max-width: 900px) { .metrics-row { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .metrics-row { grid-template-columns: 1fr 1fr; } }

.metric-card {
  padding: 1.25rem 1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.metric-card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 12px;
  opacity: 0.12;
}
.metric-card.c-teal   { border-color: var(--teal);    box-shadow: 0 0 18px rgba(0,229,255,0.15); }
.metric-card.c-teal::before { background: var(--teal); }
.metric-card.c-magenta{ border-color: var(--magenta); box-shadow: 0 0 18px rgba(224,64,251,0.15); }
.metric-card.c-magenta::before { background: var(--magenta); }
.metric-card.c-blue   { border-color: var(--blue);    box-shadow: 0 0 18px rgba(30,111,255,0.15); }
.metric-card.c-blue::before { background: var(--blue); }
.metric-card.c-purple { border-color: var(--purple);  box-shadow: 0 0 18px rgba(108,59,170,0.2); }
.metric-card.c-purple::before { background: var(--purple); }

.metric-label {
  font-family: var(--font-main);
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}
.metric-value {
  font-family: var(--font-main);
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  font-weight: 700;
  line-height: 1.1;
}
.metric-card.c-teal    .metric-value { color: var(--teal); text-shadow: 0 0 10px var(--teal); }
.metric-card.c-magenta .metric-value { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); }
.metric-card.c-blue    .metric-value { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
.metric-card.c-purple  .metric-value { color: #b47fff; text-shadow: 0 0 10px var(--purple); }
.metric-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.3rem; }

/* ── Info + orbital row ─────────────────────────────── */
.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.25rem;
}
@media (max-width: 700px) { .info-row { grid-template-columns: 1fr; } }

.info-panel, .orbital-panel {
  padding: 1.25rem 1.5rem;
}
.panel-title {
  font-family: var(--font-main);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--teal);
  text-shadow: 0 0 8px var(--teal);
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}

.info-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.4rem 1rem;
  font-size: 0.78rem;
}
.info-key { color: var(--muted); white-space: nowrap; }
.info-val { color: var(--text); word-break: break-word; }
.info-val a { color: var(--blue); text-decoration: none; }
.info-val a:hover { text-decoration: underline; }

/* ── Badges ─────────────────────────────────────────── */
.badge {
  display: inline-block;
  font-family: var(--font-main);
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0.2rem 0.6rem;
  border-radius: 20px;
  text-transform: uppercase;
}
.badge-pha-true {
  background: rgba(255,23,68,0.15);
  border: 1px solid var(--red);
  color: var(--red);
  box-shadow: 0 0 8px rgba(255,23,68,0.4);
  animation: pha-pulse 2s ease-in-out infinite;
}
@keyframes pha-pulse {
  0%,100% { box-shadow: 0 0 6px rgba(255,23,68,0.3); }
  50%      { box-shadow: 0 0 14px rgba(255,23,68,0.7); }
}
.badge-pha-false {
  background: rgba(0,230,118,0.1);
  border: 1px solid var(--green);
  color: var(--green);
}
.badge-sentry-true {
  background: rgba(255,171,0,0.1);
  border: 1px solid var(--amber);
  color: var(--amber);
  box-shadow: 0 0 8px rgba(255,171,0,0.3);
}
.badge-sentry-false {
  background: rgba(90,122,154,0.1);
  border: 1px solid var(--muted);
  color: var(--muted);
}

/* ── Close approach table ───────────────────────────── */
.table-panel { padding: 1.25rem 1.5rem; }
.table-wrap {
  overflow-x: auto;
  max-height: 360px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.72rem;
  min-width: 680px;
}
thead th {
  font-family: var(--font-main);
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--teal);
  padding: 0.6rem 0.75rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--bg2);
}
tbody tr:nth-child(odd)  { background: rgba(0,0,0,0.25); }
tbody tr:nth-child(even) { background: rgba(0,229,255,0.02); }
tbody tr:hover { background: rgba(0,229,255,0.06); }
tbody td { padding: 0.5rem 0.75rem; color: var(--text); border-bottom: 1px solid rgba(0,229,255,0.05); }

/* ── Error card ─────────────────────────────────────── */
.error-card {
  padding: 2rem;
  text-align: center;
  border-color: rgba(255,23,68,0.3);
}
.error-card h3 {
  font-family: var(--font-main);
  color: var(--red);
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
}
.error-card p { color: var(--muted); font-size: 0.8rem; margin-bottom: 1rem; }
.retry-btn {
  font-family: var(--font-main);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  padding: 0.5rem 1.2rem;
  border-radius: 6px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s;
}
.retry-btn:hover { background: rgba(255,23,68,0.15); }
</style>
</head>

<div id="app">
  <header>
    <h1>&#9654; CLOSE APPROACH</h1>
    <p>NASA Near Earth Object Dashboard &mdash; Live Data from NeoWs API</p>
  </header>

  <div id="tab-bar" role="tablist"></div>
  <div id="tab-content"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const API_KEY = "fcFgJjLwLGlOYwCagaTgyABuPUo3grtAbdLdQl7t";

const ASTEROIDS = [
  { id: "2000433", name: "433 Eros" },
  { id: "2099942", name: "99942 Apophis" },
  { id: "2001036", name: "1036 Ganymed" },
  { id: "2003122", name: "3122 Florence" },
  { id: "2101955", name: "101955 Bennu" },
];

const BASE = "https://api.nasa.gov/neo/rest/v1/neo";

// ── Star field ─────────────────────────────────────────────────────────────
(function initStars() {
  const canvas = document.getElementById("starfield");
  const ctx = canvas.getContext("2d");
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 220 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.002,
      phase: Math.random() * Math.PI * 2,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    stars.forEach(s => {
      const alpha = 0.4 + 0.5 * Math.sin(t * s.speed * 20 + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(205,224,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener("resize", resize);
  draw();
})();

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchAsteroid(id) {
  const res = await fetch(`${BASE}/${id}?api_key=${API_KEY}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(n, decimals = 2) {
  if (n === null || n === undefined) return "—";
  const num = parseFloat(n);
  return isNaN(num) ? "—" : num.toLocaleString("en-US", { maximumFractionDigits: decimals });
}

function closestApproach(approaches) {
  if (!approaches.length) return null;
  return approaches.reduce((a, b) =>
    parseFloat(a.miss_distance.kilometers) < parseFloat(b.miss_distance.kilometers) ? a : b
  );
}

function fastestApproach(approaches) {
  if (!approaches.length) return null;
  return approaches.reduce((a, b) =>
    parseFloat(a.relative_velocity.kilometers_per_second) > parseFloat(b.relative_velocity.kilometers_per_second) ? a : b
  );
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderPanel(data) {
  const approaches = data.close_approach_data || [];
  const od = data.orbital_data || {};
  const est = data.estimated_diameter?.kilometers || {};
  const isPHA = data.is_potentially_hazardous_asteroid;
  const isSentry = data.is_sentry_object;

  const closest = closestApproach(approaches);
  const fastest = fastestApproach(approaches);

  const closestKm = closest ? fmt(parseFloat(closest.miss_distance.kilometers), 0) + " km" : "—";
  const fastestKms = fastest ? fmt(parseFloat(fastest.relative_velocity.kilometers_per_second), 2) + " km/s" : "—";
  const maxDiam = est.estimated_diameter_max ? fmt(est.estimated_diameter_max, 3) + " km" : "—";

  const phaBadge = isPHA
    ? `<span class="badge badge-pha-true">&#9888; Hazardous</span>`
    : `<span class="badge badge-pha-false">&#10003; Non-Hazardous</span>`;
  const sentryBadge = isSentry
    ? `<span class="badge badge-sentry-true">&#9888; Sentry Object</span>`
    : `<span class="badge badge-sentry-false">Not on Sentry List</span>`;

  const oc = od.orbit_class || {};
  const jplUrl = data.nasa_jpl_url || "#";

  // Table rows
  const rows = approaches.map(a => `
    <tr>
      <td>${a.close_approach_date}</td>
      <td>${fmt(parseFloat(a.relative_velocity.kilometers_per_second), 3)}</td>
      <td>${fmt(parseFloat(a.relative_velocity.kilometers_per_hour), 0)}</td>
      <td>${fmt(parseFloat(a.miss_distance.kilometers), 0)}</td>
      <td>${fmt(parseFloat(a.miss_distance.lunar), 2)}</td>
      <td>${fmt(parseFloat(a.miss_distance.astronomical), 5)}</td>
      <td>${a.orbiting_body}</td>
    </tr>
  `).join("");

  return `
    <div class="metrics-row">
      <div class="glass metric-card c-teal">
        <div class="metric-label">Closest Approach</div>
        <div class="metric-value">${closestKm.split(" ")[0]}</div>
        <div class="metric-sub">km miss distance</div>
      </div>
      <div class="glass metric-card c-magenta">
        <div class="metric-label">Fastest Velocity</div>
        <div class="metric-value">${fastestKms}</div>
        <div class="metric-sub">relative velocity</div>
      </div>
      <div class="glass metric-card c-blue">
        <div class="metric-label">Total Approaches</div>
        <div class="metric-value">${approaches.length}</div>
        <div class="metric-sub">recorded encounters</div>
      </div>
      <div class="glass metric-card c-purple">
        <div class="metric-label">Max Diameter</div>
        <div class="metric-value">${maxDiam}</div>
        <div class="metric-sub">estimated (km)</div>
      </div>
    </div>

    <div class="info-row">
      <div class="glass info-panel">
        <div class="panel-title">Asteroid Information</div>
        <div class="info-grid">
          <span class="info-key">Designation</span>
          <span class="info-val">${data.name || "—"}</span>
          <span class="info-key">NASA JPL</span>
          <span class="info-val"><a href="${jplUrl}" target="_blank" rel="noopener">${jplUrl}</a></span>
          <span class="info-key">Abs. Magnitude</span>
          <span class="info-val">${data.absolute_magnitude_h || "—"} H</span>
          <span class="info-key">Diameter (min)</span>
          <span class="info-val">${fmt(est.estimated_diameter_min, 4)} km</span>
          <span class="info-key">Diameter (max)</span>
          <span class="info-val">${fmt(est.estimated_diameter_max, 4)} km</span>
          <span class="info-key">Hazard Status</span>
          <span class="info-val">${phaBadge}</span>
          <span class="info-key">Sentry Status</span>
          <span class="info-val">${sentryBadge}</span>
        </div>
      </div>

      <div class="glass orbital-panel">
        <div class="panel-title">Orbital Data</div>
        <div class="info-grid">
          <span class="info-key">Orbit Class</span>
          <span class="info-val">${oc.orbit_class_type || "—"} — ${oc.orbit_class_description || ""}</span>
          <span class="info-key">Orbital Period</span>
          <span class="info-val">${fmt(od.orbital_period, 2)} days</span>
          <span class="info-key">Perihelion (AU)</span>
          <span class="info-val">${fmt(od.perihelion_distance, 6)}</span>
          <span class="info-key">Aphelion (AU)</span>
          <span class="info-val">${fmt(od.aphelion_distance, 6)}</span>
          <span class="info-key">Inclination</span>
          <span class="info-val">${fmt(od.inclination, 4)}°</span>
          <span class="info-key">Eccentricity</span>
          <span class="info-val">${fmt(od.eccentricity, 6)}</span>
          <span class="info-key">First Observed</span>
          <span class="info-val">${od.first_observation_date || "—"}</span>
          <span class="info-key">Last Observed</span>
          <span class="info-val">${od.last_observation_date || "—"}</span>
          <span class="info-key">Orbit Determined</span>
          <span class="info-val">${od.orbit_determination_date || "—"}</span>
        </div>
      </div>
    </div>

    <div class="glass table-panel">
      <div class="panel-title">Close Approach History (${approaches.length} records)</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Velocity (km/s)</th>
              <th>Velocity (km/h)</th>
              <th>Miss Dist. (km)</th>
              <th>Miss Dist. (LD)</th>
              <th>Miss Dist. (AU)</th>
              <th>Orbiting Body</th>
            </tr>
          </thead>
          <tbody>${rows || "<tr><td colspan='7' style='text-align:center;color:var(--muted)'>No approach data available</td></tr>"}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderError(name, msg, id) {
  return `
    <div class="glass error-card">
      <h3>&#9888; Failed to load ${name}</h3>
      <p>Error: ${msg}</p>
      <button class="retry-btn" onclick="retryAsteroid('${id}')">Retry</button>
    </div>
  `;
}

function renderSkeleton() {
  return `
    <div class="metrics-row">
      ${[0,1,2,3].map(() => `<div class="skeleton" style="height:100px"></div>`).join("")}
    </div>
    <div class="info-row">
      <div class="skeleton" style="height:220px"></div>
      <div class="skeleton" style="height:220px"></div>
    </div>
    <div class="skeleton" style="height:280px"></div>
  `;
}

// ── Init ───────────────────────────────────────────────────────────────────
const tabBar = document.getElementById("tab-bar");
const tabContent = document.getElementById("tab-content");

// Build tab skeleton structure
ASTEROIDS.forEach((ast, i) => {
  // Tab button
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (i === 0 ? " active" : "");
  btn.id = `tab-btn-${i}`;
  btn.setAttribute("role", "tab");
  btn.setAttribute("aria-selected", i === 0 ? "true" : "false");
  btn.setAttribute("aria-controls", `tab-panel-${i}`);
  btn.textContent = ast.name;
  btn.addEventListener("click", () => activateTab(i));
  tabBar.appendChild(btn);

  // Tab panel
  const panel = document.createElement("div");
  panel.className = "tab-panel" + (i === 0 ? " active" : "");
  panel.id = `tab-panel-${i}`;
  panel.setAttribute("role", "tabpanel");
  panel.innerHTML = renderSkeleton();
  tabContent.appendChild(panel);
});

function activateTab(index) {
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", i === index);
    b.setAttribute("aria-selected", i === index ? "true" : "false");
  });
  document.querySelectorAll(".tab-panel").forEach((p, i) => {
    p.classList.toggle("active", i === index);
  });
}

async function retryAsteroid(id) {
  const i = ASTEROIDS.findIndex(a => a.id === id);
  if (i === -1) return;
  const panel = document.getElementById(`tab-panel-${i}`);
  panel.innerHTML = renderSkeleton();
  try {
    const data = await fetchAsteroid(id);
    panel.innerHTML = renderPanel(data);
    // Update tab label with PHA indicator
    const btn = document.getElementById(`tab-btn-${i}`);
    btn.innerHTML = ASTEROIDS[i].name + (data.is_potentially_hazardous_asteroid ? '<span class="pha-icon">&#9888;</span>' : "");
  } catch (err) {
    panel.innerHTML = renderError(ASTEROIDS[i].name, err.message, id);
  }
}

// Load all asteroids in parallel
(async function init() {
  const results = await Promise.allSettled(ASTEROIDS.map(a => fetchAsteroid(a.id)));

  // Hide loading overlay
  const overlay = document.getElementById("loading-overlay");
  overlay.classList.add("fade-out");
  setTimeout(() => overlay.remove(), 500);

  results.forEach((result, i) => {
    const panel = document.getElementById(`tab-panel-${i}`);
    const btn   = document.getElementById(`tab-btn-${i}`);
    if (result.status === "fulfilled") {
      const data = result.value;
      panel.innerHTML = renderPanel(data);
      btn.innerHTML = ASTEROIDS[i].name + (data.is_potentially_hazardous_asteroid ? '<span class="pha-icon">&#9888;</span>' : "");
    } else {
      panel.innerHTML = renderError(ASTEROIDS[i].name, result.reason.message, ASTEROIDS[i].id);
    }
  });
})();
</script>
</body>
</html>
